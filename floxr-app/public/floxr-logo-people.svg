<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Dark background -->
  <rect width="200" height="60" fill="#0F172A"/>
  
  <!-- Text: fl -->
  <text x="10" y="45" font-family="Inter, sans-serif" font-weight="800" font-size="36" fill="#FFFFFF">fl</text>
  
  <!-- People connecting icon for 'o' -->
  <g transform="translate(68, 30)">
    <defs>
      <linearGradient id="peopleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
        <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
        <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:1" />
      </linearGradient>
    </defs>
    
    <!-- Three people in a circle -->
    <!-- Person 1 (top) -->
    <circle cx="0" cy="-7" r="2" fill="url(#peopleGrad)"/>
    <circle cx="0" cy="-3" r="3" fill="none" stroke="url(#peopleGrad)" stroke-width="1.5"/>
    
    <!-- Person 2 (bottom left) -->
    <circle cx="-6" cy="4" r="2" fill="url(#peopleGrad)"/>
    <circle cx="-6" cy="8" r="3" fill="none" stroke="url(#peopleGrad)" stroke-width="1.5"/>
    
    <!-- Person 3 (bottom right) -->
    <circle cx="6" cy="4" r="2" fill="url(#peopleGrad)"/>
    <circle cx="6" cy="8" r="3" fill="none" stroke="url(#peopleGrad)" stroke-width="1.5"/>
    
    <!-- Connecting lines -->
    <line x1="0" y1="0" x2="-3" y2="6" stroke="url(#peopleGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="0" y1="0" x2="3" y2="6" stroke="url(#peopleGrad)" stroke-width="1" opacity="0.5"/>
    <line x1="-3" y1="8" x2="3" y2="8" stroke="url(#peopleGrad)" stroke-width="1" opacity="0.5"/>
  </g>
  
  <!-- Text: xr -->
  <text x="90" y="45" font-family="Inter, sans-serif" font-weight="800" font-size="36" fill="#FFFFFF">xr</text>
</svg>
