<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes rotate-gear {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
  
  <!-- Text: fl -->
  <!-- We'll use a very bold font, like system-ui or Inter Black -->
  <text x="10" y="55" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="52" fill="#000000" letter-spacing="1">fl</text>
  
  <!-- Gear icon for 'o' -->
  <g transform="translate(68, 40)">
    <g style="animation: rotate-gear 8s linear infinite; transform-origin: 0px 0px;">
      <!-- Outer thick circle -->
      <circle cx="0" cy="0" r="12" fill="none" stroke="#000000" stroke-width="5"/>
      <!-- Inner dot -->
      <circle cx="0" cy="0" r="4.5" fill="#000000"/>
      
      <!-- Thick Gear teeth (8 teeth) -->
      <rect x="-2.5" y="-16" width="5" height="5" fill="#000000" rx="1"/>
      <rect x="-2.5" y="11" width="5" height="5" fill="#000000" rx="1"/>
      <rect x="-16" y="-2.5" width="5" height="5" fill="#000000" rx="1"/>
      <rect x="11" y="-2.5" width="5" height="5" fill="#000000" rx="1"/>
      
      <rect transform="rotate(45)" x="-2.5" y="-16" width="5" height="5" fill="#000000" rx="1"/>
      <rect transform="rotate(45)" x="-2.5" y="11" width="5" height="5" fill="#000000" rx="1"/>
      <rect transform="rotate(-45)" x="-2.5" y="-16" width="5" height="5" fill="#000000" rx="1"/>
      <rect transform="rotate(-45)" x="-2.5" y="11" width="5" height="5" fill="#000000" rx="1"/>
    </g>
  </g>
  
  <!-- Text: xr -->
  <text x="90" y="55" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="52" fill="#000000" letter-spacing="1">xr</text>
</svg>
