<svg viewBox="0 0 115 60" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMinYMid meet">
  <style>
    @keyframes rotate-gear {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
  
  <text x="2" y="44" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="44" fill="#000000" letter-spacing="-1">fl</text>
  
  <g transform="translate(46, 30)">
    <g style="animation: rotate-gear 8s linear infinite; transform-origin: 0px 0px;">
      <circle cx="0" cy="0" r="10" fill="none" stroke="#000000" stroke-width="4"/>
      <circle cx="0" cy="0" r="3.5" fill="#000000"/>
      
      <rect x="-2" y="-14" width="4" height="4" fill="#000000" rx="0.5"/>
      <rect x="-2" y="10" width="4" height="4" fill="#000000" rx="0.5"/>
      <rect x="-14" y="-2" width="4" height="4" fill="#000000" rx="0.5"/>
      <rect x="10" y="-2" width="4" height="4" fill="#000000" rx="0.5"/>
      
      <rect transform="rotate(45)" x="-2" y="-14" width="4" height="4" fill="#000000" rx="0.5"/>
      <rect transform="rotate(45)" x="-2" y="10" width="4" height="4" fill="#000000" rx="0.5"/>
      <rect transform="rotate(-45)" x="-2" y="-14" width="4" height="4" fill="#000000" rx="0.5"/>
      <rect transform="rotate(-45)" x="-2" y="10" width="4" height="4" fill="#000000" rx="0.5"/>
    </g>
  </g>
  
  <text x="66" y="44" font-family="system-ui, -apple-system, sans-serif" font-weight="900" font-size="44" fill="#000000" letter-spacing="-1">xr</text>
</svg>
