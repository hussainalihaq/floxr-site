<svg width="200" height="80" viewBox="0 0 200 80" xmlns="http://www.w3.org/2000/svg">
  <!-- CSS Animation for spinning gear -->
  <style>
    @keyframes rotate-gear {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
  
  <!-- Text: fl -->
  <text x="15" y="55" font-family="Inter, sans-serif" font-weight="800" font-size="48" fill="#ffffff" letter-spacing="2">fl</text>
  
  <!-- Gear icon for 'o' - rotating in place like a wheel -->
  <g transform="translate(65, 42)">
    <!-- Rotating group for gear -->
    <g style="animation: rotate-gear 6s linear infinite; transform-origin: 0px 0px;">
      <!-- Gear -->
      <circle cx="0" cy="0" r="10" fill="none" stroke="#ffffff" stroke-width="2.5"/>
      <circle cx="0" cy="0" r="4" fill="#ffffff"/>
      
      <!-- Gear teeth (8 teeth) -->
      <rect x="-1.5" y="-12.5" width="3" height="4" fill="#ffffff" rx="0.5"/>
      <rect x="-1.5" y="8.5" width="3" height="4" fill="#ffffff" rx="0.5"/>
      <rect x="-12.5" y="-1.5" width="4" height="3" fill="#ffffff" rx="0.5"/>
      <rect x="8.5" y="-1.5" width="4" height="3" fill="#ffffff" rx="0.5"/>
      
      <!-- Diagonal teeth -->
      <rect transform="rotate(45)" x="-1.5" y="-12.5" width="3" height="4" fill="#ffffff" rx="0.5"/>
      <rect transform="rotate(45)" x="-1.5" y="8.5" width="3" height="4" fill="#ffffff" rx="0.5"/>
      <rect transform="rotate(-45)" x="-1.5" y="-12.5" width="3" height="4" fill="#ffffff" rx="0.5"/>
      <rect transform="rotate(-45)" x="-1.5" y="8.5" width="3" height="4" fill="#ffffff" rx="0.5"/>
    </g>
  </g>
  
  <!-- Text: xr -->
  <text x="80" y="55" font-family="Inter, sans-serif" font-weight="800" font-size="48" fill="#ffffff" letter-spacing="2">xr</text>
</svg>
