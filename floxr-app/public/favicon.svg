<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes rotate-gear {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
  
  <g transform="translate(32, 32)">
    <g style="animation: rotate-gear 6s linear infinite; transform-origin: 0px 0px;">
      <circle cx="0" cy="0" r="16" fill="none" stroke="#000000" stroke-width="4"/>
      <circle cx="0" cy="0" r="6" fill="#000000"/>
      
      <rect x="-2.5" y="-20" width="5" height="6" fill="#000000" rx="1"/>
      <rect x="-2.5" y="14" width="5" height="6" fill="#000000" rx="1"/>
      <rect x="-20" y="-2.5" width="6" height="5" fill="#000000" rx="1"/>
      <rect x="14" y="-2.5" width="6" height="5" fill="#000000" rx="1"/>
      
      <rect transform="rotate(45)" x="-2.5" y="-20" width="5" height="6" fill="#000000" rx="1"/>
      <rect transform="rotate(45)" x="-2.5" y="14" width="5" height="6" fill="#000000" rx="1"/>
      <rect transform="rotate(-45)" x="-2.5" y="-20" width="5" height="6" fill="#000000" rx="1"/>
      <rect transform="rotate(-45)" x="-2.5" y="14" width="5" height="6" fill="#000000" rx="1"/>
    </g>
  </g>
</svg>
