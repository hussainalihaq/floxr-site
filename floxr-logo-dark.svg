<svg width="135" height="60" viewBox="0 0 135 60" xmlns="http://www.w3.org/2000/svg">
  <!-- Transparent background -->
  
  <!-- CSS Animation for spinning gear -->
  <style>
    @keyframes rotate-gear {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
  
  <!-- Text: fl (WHITE for dark mode) -->
  <text x="10" y="45" font-family="Inter, sans-serif" font-weight="800" font-size="36" fill="#FFFFFF" letter-spacing="2">fl</text>
  
  <!-- Gear icon for 'o' - rotating in place like a wheel -->
  <g transform="translate(44, 35)">
    <!-- Rotating group for gear -->
    <g style="animation: rotate-gear 4s linear infinite; transform-origin: 0px 0px;">
      <!-- Gear with gradient (SAME as light mode) -->
      <defs>
        <linearGradient id="gearGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#FF6B6B;stop-opacity:1" />
        </linearGradient>
      </defs>
      
      <!-- Simplified gear shape - smaller size -->
      <circle cx="0" cy="0" r="8" fill="none" stroke="url(#gearGradDark)" stroke-width="1.8"/>
      <circle cx="0" cy="0" r="3" fill="url(#gearGradDark)"/>
      
      <!-- Gear teeth (8 teeth) - smaller -->
      <rect x="-1.2" y="-9.5" width="2.4" height="3" fill="url(#gearGradDark)" rx="0.5"/>
      <rect x="-1.2" y="6.5" width="2.4" height="3" fill="url(#gearGradDark)" rx="0.5"/>
      <rect x="-9.5" y="-1.2" width="3" height="2.4" fill="url(#gearGradDark)" rx="0.5"/>
      <rect x="6.5" y="-1.2" width="3" height="2.4" fill="url(#gearGradDark)" rx="0.5"/>
      
      <!-- Diagonal teeth -->
      <rect transform="rotate(45)" x="-1.2" y="-9.5" width="2.4" height="3" fill="url(#gearGradDark)" rx="0.5"/>
      <rect transform="rotate(45)" x="-1.2" y="6.5" width="2.4" height="3" fill="url(#gearGradDark)" rx="0.5"/>
      <rect transform="rotate(-45)" x="-1.2" y="-9.5" width="2.4" height="3" fill="url(#gearGradDark)" rx="0.5"/>
      <rect transform="rotate(-45)" x="-1.2" y="6.5" width="2.4" height="3" fill="url(#gearGradDark)" rx="0.5"/>
    </g>
  </g>
  
  <!-- Text: xr (WHITE for dark mode) -->
  <text x="55" y="45" font-family="Inter, sans-serif" font-weight="800" font-size="36" fill="#FFFFFF" letter-spacing="2">xr</text>
</svg>
